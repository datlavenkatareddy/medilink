version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: medilink_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: medilink
      MYSQL_USER: medilink_user
      MYSQL_PASSWORD: medilink_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
